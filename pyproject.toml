[project]
name = "cc-tts"
version = "0.1.0"
description = "Text-to-speech output plugin for Claude Code"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "qte77" }]
dependencies = []

[project.optional-dependencies]
piper = ["piper-tts>=1.2.0"]
edge = ["edge-tts>=6.1.0"]
all = ["piper-tts>=1.2.0", "edge-tts>=6.1.0"]
dev = ["ruff>=0.9.0", "pyright>=1.1.390"]
test = ["pytest>=8.0", "pytest-cov>=6.0"]

[project.scripts]
cc-tts = "cc_tts.speak:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[tool.hatch.build.targets.wheel]
packages = ["src/cc_tts"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pyright]
pythonVersion = "3.10"
include = ["src"]
typeCheckingMode = "strict"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
